<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="180" fill="#f1f5f9"/>
  <text x="150" y="22" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">PLAN VIEW (TOP-DOWN)</text>
  <!-- Container 1 -->
  <rect x="18" y="70" width="122" height="38" fill="#64748b" stroke="#1e293b" stroke-width="2" rx="1"/>
  <line x1="38" y1="70" x2="38" y2="108" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="58" y1="70" x2="58" y2="108" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="78" y1="70" x2="78" y2="108" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="98" y1="70" x2="98" y2="108" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="118" y1="70" x2="118" y2="108" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <rect x="128" y="70" width="12" height="38" fill="#334155" stroke="#1e293b" stroke-width="1"/>
  <text x="73" y="93" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e2e8f0" font-weight="bold">CONTAINER 1</text>
  <!-- Connection joint -->
  <rect x="140" y="78" width="20" height="22" fill="#d97706" opacity="0.8"/>
  <!-- Container 2 -->
  <rect x="160" y="70" width="122" height="38" fill="#475569" stroke="#1e293b" stroke-width="2" rx="1"/>
  <line x1="180" y1="70" x2="180" y2="108" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="200" y1="70" x2="200" y2="108" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="220" y1="70" x2="220" y2="108" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="240" y1="70" x2="240" y2="108" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="260" y1="70" x2="260" y2="108" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <rect x="160" y="70" width="12" height="38" fill="#334155" stroke="#1e293b" stroke-width="1"/>
  <text x="221" y="93" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e2e8f0" font-weight="bold">CONTAINER 2</text>
  <!-- Dimensions -->
  <line x1="18" y1="118" x2="282" y2="118" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="150" y="132" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">two containers joined end-to-end</text>
  <text x="150" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#44403c">LINEAR / END-TO-END</text>
</svg>

<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="180" fill="#e0f2fe"/>
  <rect y="140" width="300" height="40" fill="#d4c4a8"/>
  <rect y="137" width="300" height="6" fill="#86efac"/>
  <!-- Sun (upper right) -->
  <circle cx="255" cy="38" r="22" fill="#fbbf24" opacity="0.9"/>
  <line x1="255" y1="8" x2="255" y2="16" stroke="#f59e0b" stroke-width="2"/>
  <line x1="255" y1="60" x2="255" y2="68" stroke="#f59e0b" stroke-width="2"/>
  <line x1="225" y1="38" x2="233" y2="38" stroke="#f59e0b" stroke-width="2"/>
  <line x1="277" y1="38" x2="285" y2="38" stroke="#f59e0b" stroke-width="2"/>
  <line x1="234" y1="17" x2="240" y2="23" stroke="#f59e0b" stroke-width="2"/>
  <line x1="270" y1="53" x2="276" y2="59" stroke="#f59e0b" stroke-width="2"/>
  <line x1="270" y1="17" x2="276" y2="23" stroke="#f59e0b" stroke-width="2"/>
  <line x1="234" y1="53" x2="240" y2="59" stroke="#f59e0b" stroke-width="2"/>
  <!-- Solar gain arrows to windows -->
  <line x1="237" y1="55" x2="195" y2="90" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <line x1="232" y1="60" x2="175" y2="100" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- House body -->
  <rect x="42" y="88" width="205" height="52" fill="#f5f5f4" stroke="#a8a29e" stroke-width="1.5"/>
  <!-- Roof with good overhang (passive solar feature) -->
  <polygon points="28,88 144,46 272,88" fill="#d97706" stroke="#78350f" stroke-width="2"/>
  <!-- Roof overhang lines -->
  <line x1="28" y1="88" x2="14" y2="88" stroke="#78350f" stroke-width="2"/>
  <line x1="272" y1="88" x2="286" y2="88" stroke="#78350f" stroke-width="2"/>
  <!-- Large south-facing windows -->
  <rect x="62" y="97" width="58" height="38" fill="#bae6fd" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="91" y1="97" x2="91" y2="135" stroke="#94a3b8" stroke-width="1"/>
  <rect x="170" y="97" width="58" height="38" fill="#bae6fd" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="199" y1="97" x2="199" y2="135" stroke="#94a3b8" stroke-width="1"/>
  <!-- Ceiling vent for hot air out -->
  <rect x="128" y="86" width="32" height="6" fill="#374151" rx="2"/>
  <!-- Cross-ventilation airflow arrows -->
  <!-- Air in left -->
  <path d="M20,110 L42,110" stroke="#60a5fa" stroke-width="2" fill="none"/>
  <polygon points="40,106 48,110 40,114" fill="#60a5fa"/>
  <!-- Air out right -->
  <path d="M247,115 L265,115" stroke="#60a5fa" stroke-width="2" fill="none"/>
  <polygon points="263,111 271,115 263,119" fill="#60a5fa"/>
  <!-- Hot air out top -->
  <path d="M144,88 L144,72" stroke="#f97316" stroke-width="2" fill="none"/>
  <polygon points="140,73 144,65 148,73" fill="#f97316"/>
  <!-- Thermal mass label -->
  <text x="144" y="125" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#64748b">no mechanical system</text>
  <text x="144" y="136" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#64748b">sun + airflow = comfort</text>
  <text x="150" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#44403c">PASSIVE (NO MECHANICAL)</text>
</svg>

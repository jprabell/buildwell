<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="180" fill="#e0f2fe"/>
  <!-- House outline -->
  <rect x="30" y="72" width="240" height="90" fill="#f5f5f4" stroke="#a8a29e" stroke-width="1.5" opacity="0.6"/>
  <polygon points="22,72 150,28 278,72" fill="#d97706" stroke="#78350f" stroke-width="1.5"/>
  <!-- Supply ducts (amber, going up from trunk to vents) -->
  <rect x="76" y="82" width="10" height="28" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <rect x="118" y="82" width="10" height="28" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <rect x="170" y="82" width="10" height="28" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <rect x="212" y="82" width="10" height="28" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
  <!-- Vent grilles -->
  <rect x="72" y="78" width="18" height="6" fill="#374151" rx="1"/>
  <rect x="114" y="78" width="18" height="6" fill="#374151" rx="1"/>
  <rect x="166" y="78" width="18" height="6" fill="#374151" rx="1"/>
  <rect x="208" y="78" width="18" height="6" fill="#374151" rx="1"/>
  <!-- Main supply trunk -->
  <rect x="72" y="110" width="154" height="12" fill="#fbbf24" stroke="#d97706" stroke-width="1.5" rx="2"/>
  <!-- Air handler unit -->
  <rect x="118" y="122" width="62" height="38" fill="#6b7280" stroke="#374151" stroke-width="2" rx="3"/>
  <!-- Fan symbol -->
  <circle cx="149" cy="141" r="13" fill="none" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="149" y1="128" x2="149" y2="154" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="136" y1="141" x2="162" y2="141" stroke="#d1d5db" stroke-width="1.5"/>
  <line x1="140" y1="132" x2="158" y2="150" stroke="#d1d5db" stroke-width="1"/>
  <line x1="158" y1="132" x2="140" y2="150" stroke="#d1d5db" stroke-width="1"/>
  <!-- Return air duct (blue, lower) -->
  <rect x="72" y="155" width="154" height="8" fill="#93c5fd" stroke="#3b82f6" stroke-width="1" rx="2" opacity="0.8"/>
  <!-- Labels -->
  <text x="149" y="126" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white">AIR HANDLER</text>
  <text x="149" y="167" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#3b82f6">return air</text>
  <text x="150" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#44403c">CENTRAL HVAC (FORCED AIR)</text>
</svg>

<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="200" height="150" fill="#f5f5f4"/>
  <!-- Buried soil sides -->
  <rect x="0" y="72" width="32" height="78" fill="#a07850"/>
  <rect x="168" y="72" width="32" height="78" fill="#a07850"/>
  <!-- Bottom soil -->
  <rect x="0" y="118" width="200" height="32" fill="#a07850"/>
  <!-- Crawl space air gap (light blue) -->
  <rect x="32" y="72" width="136" height="46" fill="#dbeafe"/>
  <!-- Grade line -->
  <line x1="0" y1="72" x2="200" y2="72" stroke="#d97706" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Left stem wall (concrete block) -->
  <rect x="22" y="72" width="18" height="46" fill="#d6d3d1" stroke="#78716c" stroke-width="1.5"/>
  <line x1="22" y1="85" x2="40" y2="85" stroke="#a8a29e" stroke-width="0.8"/>
  <line x1="22" y1="98" x2="40" y2="98" stroke="#a8a29e" stroke-width="0.8"/>
  <line x1="22" y1="111" x2="40" y2="111" stroke="#a8a29e" stroke-width="0.8"/>
  <!-- Left vent opening -->
  <rect x="22" y="100" width="18" height="8" fill="#bfdbfe" stroke="#93c5fd" stroke-width="1"/>
  <!-- Right stem wall (concrete block) -->
  <rect x="160" y="72" width="18" height="46" fill="#d6d3d1" stroke="#78716c" stroke-width="1.5"/>
  <line x1="160" y1="85" x2="178" y2="85" stroke="#a8a29e" stroke-width="0.8"/>
  <line x1="160" y1="98" x2="178" y2="98" stroke="#a8a29e" stroke-width="0.8"/>
  <line x1="160" y1="111" x2="178" y2="111" stroke="#a8a29e" stroke-width="0.8"/>
  <!-- Right vent opening -->
  <rect x="160" y="100" width="18" height="8" fill="#bfdbfe" stroke="#93c5fd" stroke-width="1"/>
  <!-- Rim board / floor joist -->
  <rect x="18" y="60" width="164" height="13" fill="#92400e" stroke="#78350f" stroke-width="1.5"/>
  <!-- Floor sheathing -->
  <rect x="18" y="48" width="164" height="13" fill="#d4b896" stroke="#78716c" stroke-width="1"/>
  <!-- Wall stubs above -->
  <rect x="18" y="12" width="18" height="36" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1.5"/>
  <rect x="164" y="12" width="18" height="36" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1.5"/>
</svg>

<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="200" height="150" fill="#f5f5f4"/>
  <!-- Soil -->
  <rect x="0" y="105" width="200" height="45" fill="#a07850"/>
  <!-- Grade line -->
  <line x1="0" y1="105" x2="200" y2="105" stroke="#d97706" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Air gap (open beneath floor) -->
  <rect x="18" y="68" width="164" height="37" fill="#f0f9ff" opacity="0.7"/>
  <!-- Pier 1 -->
  <rect x="30" y="75" width="18" height="54" fill="#d6d3d1" stroke="#78716c" stroke-width="2"/>
  <!-- Pier 1 footing -->
  <rect x="24" y="122" width="30" height="8" fill="#d6d3d1" stroke="#78716c" stroke-width="1.5"/>
  <!-- Pier 2 -->
  <rect x="91" y="75" width="18" height="54" fill="#d6d3d1" stroke="#78716c" stroke-width="2"/>
  <!-- Pier 2 footing -->
  <rect x="85" y="122" width="30" height="8" fill="#d6d3d1" stroke="#78716c" stroke-width="1.5"/>
  <!-- Pier 3 -->
  <rect x="152" y="75" width="18" height="54" fill="#d6d3d1" stroke="#78716c" stroke-width="2"/>
  <!-- Pier 3 footing -->
  <rect x="146" y="122" width="30" height="8" fill="#d6d3d1" stroke="#78716c" stroke-width="1.5"/>
  <!-- Beam spanning piers -->
  <rect x="18" y="57" width="164" height="18" fill="#92400e" stroke="#78350f" stroke-width="2"/>
  <!-- Floor decking -->
  <rect x="18" y="43" width="164" height="15" fill="#d4b896" stroke="#78716c" stroke-width="1.5"/>
  <!-- Deck board lines -->
  <line x1="45" y1="43" x2="45" y2="58" stroke="#a8a29e" stroke-width="0.8"/>
  <line x1="72" y1="43" x2="72" y2="58" stroke="#a8a29e" stroke-width="0.8"/>
  <line x1="100" y1="43" x2="100" y2="58" stroke="#a8a29e" stroke-width="0.8"/>
  <line x1="128" y1="43" x2="128" y2="58" stroke="#a8a29e" stroke-width="0.8"/>
  <line x1="155" y1="43" x2="155" y2="58" stroke="#a8a29e" stroke-width="0.8"/>
  <!-- Wall stubs above floor -->
  <rect x="18" y="10" width="18" height="33" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1.5"/>
  <rect x="164" y="10" width="18" height="33" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1.5"/>
</svg>

<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="180" fill="#e0f2fe"/>
  <rect y="140" width="300" height="40" fill="#d4c4a8"/>
  <rect y="137" width="300" height="6" fill="#86efac"/>
  <text x="150" y="22" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#93c5fd">ELEVATION VIEW (FRONT)</text>
  <!-- Container 1 (bottom / ground floor) -->
  <rect x="50" y="95" width="196" height="42" fill="#64748b" stroke="#1e293b" stroke-width="2"/>
  <line x1="50" y1="108" x2="246" y2="108" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="121" x2="246" y2="121" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="130" x2="246" y2="130" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <!-- Door C1 -->
  <rect x="82" y="107" width="22" height="30" fill="#bae6fd" stroke="#94a3b8" stroke-width="1"/>
  <line x1="93" y1="107" x2="93" y2="137" stroke="#94a3b8" stroke-width="1"/>
  <!-- Window C1 -->
  <rect x="140" y="106" width="40" height="22" fill="#bae6fd" stroke="#94a3b8" stroke-width="1"/>
  <line x1="160" y1="106" x2="160" y2="128" stroke="#94a3b8" stroke-width="1"/>
  <text x="55" y="122" text-anchor="start" font-family="sans-serif" font-size="7" fill="#e2e8f0">GROUND FLOOR</text>
  <!-- Steel beam / connector between floors -->
  <rect x="50" y="89" width="196" height="8" fill="#334155" stroke="#1e293b" stroke-width="1"/>
  <!-- Container 2 (top floor) -->
  <rect x="50" y="46" width="196" height="43" fill="#475569" stroke="#1e293b" stroke-width="2"/>
  <line x1="50" y1="58" x2="246" y2="58" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="70" x2="246" y2="70" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="80" x2="246" y2="80" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <!-- Window C2 -->
  <rect x="100" y="57" width="40" height="22" fill="#bae6fd" stroke="#94a3b8" stroke-width="1"/>
  <line x1="120" y1="57" x2="120" y2="79" stroke="#94a3b8" stroke-width="1"/>
  <rect x="160" y="57" width="40" height="22" fill="#bae6fd" stroke="#94a3b8" stroke-width="1"/>
  <line x1="180" y1="57" x2="180" y2="79" stroke="#94a3b8" stroke-width="1"/>
  <text x="55" y="68" text-anchor="start" font-family="sans-serif" font-size="7" fill="#e2e8f0">2ND FLOOR</text>
  <!-- External stair hint -->
  <rect x="222" y="89" width="24" height="6" fill="#94a3b8"/>
  <rect x="226" y="83" width="20" height="6" fill="#94a3b8" opacity="0.7"/>
  <text x="150" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#44403c">STACKED / MULTI-STORY</text>
</svg>

<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="180" fill="#e0f2fe"/>
  <!-- Sky / above ground -->
  <!-- Ground surface -->
  <rect y="78" width="300" height="6" fill="#86efac"/>
  <!-- Soil layers -->
  <rect y="84" width="300" height="30" fill="#d4c4a8"/>
  <rect y="114" width="300" height="30" fill="#c4a882"/>
  <rect y="144" width="300" height="36" fill="#a8896a"/>
  <!-- Layer labels -->
  <text x="12" y="102" text-anchor="start" font-family="sans-serif" font-size="8" fill="#78716c">SOIL</text>
  <text x="12" y="132" text-anchor="start" font-family="sans-serif" font-size="8" fill="#6b5c44">ROCK</text>
  <text x="12" y="162" text-anchor="start" font-family="sans-serif" font-size="8" fill="#5c4033">DEEP</text>
  <!-- Geothermal loop pipes going down -->
  <line x1="145" y1="84" x2="145" y2="174" stroke="#2563eb" stroke-width="3.5"/>
  <line x1="165" y1="84" x2="165" y2="174" stroke="#dc2626" stroke-width="3.5"/>
  <!-- U-bend at bottom -->
  <path d="M145,174 Q155,178 165,174" stroke="#374151" stroke-width="3.5" fill="none"/>
  <!-- Pipe labels -->
  <text x="135" y="130" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1d4ed8">cold</text>
  <text x="175" y="130" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#b91c1c">warm</text>
  <!-- Heat pump at surface -->
  <rect x="185" y="38" width="75" height="45" fill="#4b5563" stroke="#374151" stroke-width="2" rx="3"/>
  <text x="222" y="56" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" font-weight="bold">HEAT</text>
  <text x="222" y="68" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" font-weight="bold">PUMP</text>
  <!-- Pipe from ground to heat pump -->
  <line x1="145" y1="84" x2="185" y2="58" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="165" y1="84" x2="185" y2="65" stroke="#dc2626" stroke-width="2.5"/>
  <!-- Heat pump ground pad -->
  <rect x="180" y="83" width="85" height="5" fill="#d4c4a8"/>
  <!-- Connection to house -->
  <line x1="260" y1="60" x2="282" y2="60" stroke="#374151" stroke-width="2"/>
  <!-- Simple house icon -->
  <rect x="268" y="40" width="28" height="24" fill="#f5f5f4" stroke="#a8a29e" stroke-width="1.5"/>
  <polygon points="263,40 282,24 299,40" fill="#d97706" stroke="#78350f" stroke-width="1"/>
  <!-- House window -->
  <rect x="274" y="46" width="8" height="10" fill="#bae6fd" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="222" y="28" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#374151">to house</text>
  <text x="150" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#44403c">GEOTHERMAL</text>
</svg>

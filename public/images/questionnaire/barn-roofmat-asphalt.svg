<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#f1f5f9"/>
  <defs>
    <clipPath id="shingleRoofClip">
      <polygon points="150,30 30,130 270,130"/>
    </clipPath>
  </defs>
  <!-- Base roof fill -->
  <polygon points="150,30 30,130 270,130" fill="#6b7280"/>
  <!-- Asphalt shingle rows clipped to roof triangle -->
  <g clip-path="url(#shingleRoofClip)">
    <!-- Row 1 at y=60 -->
    <rect x="0" y="50" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="40" y="50" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="80" y="50" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="120" y="50" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="160" y="50" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="200" y="50" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="240" y="50" width="38" height="14" fill="#4b5563" rx="1"/>
    <!-- Row 2 (offset) -->
    <rect x="-19" y="66" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="21" y="66" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="61" y="66" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="101" y="66" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="141" y="66" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="181" y="66" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="221" y="66" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="261" y="66" width="38" height="14" fill="#4b5563" rx="1"/>
    <!-- Row 3 -->
    <rect x="0" y="82" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="40" y="82" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="80" y="82" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="120" y="82" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="160" y="82" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="200" y="82" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="240" y="82" width="38" height="14" fill="#4b5563" rx="1"/>
    <!-- Row 4 (offset) -->
    <rect x="-19" y="98" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="21" y="98" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="61" y="98" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="101" y="98" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="141" y="98" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="181" y="98" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="221" y="98" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="261" y="98" width="38" height="14" fill="#4b5563" rx="1"/>
    <!-- Row 5 -->
    <rect x="0" y="114" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="40" y="114" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="80" y="114" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="120" y="114" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="160" y="114" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="200" y="114" width="38" height="14" fill="#4b5563" rx="1"/>
    <rect x="240" y="114" width="38" height="14" fill="#4b5563" rx="1"/>
  </g>
  <line x1="30" y1="130" x2="270" y2="130" stroke="#374151" stroke-width="2"/>
  <!-- Barn body -->
  <rect x="50" y="130" width="200" height="40" fill="#7c2d12"/>
  <rect x="126" y="138" width="48" height="32" fill="#431407"/>
  <line x1="150" y1="138" x2="150" y2="170" stroke="#7c2d12" stroke-width="1.5"/>
  <!-- Label -->
  <rect x="0" y="175" width="300" height="25" fill="#1c1917"/>
  <text x="150" y="188" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" letter-spacing="1">ASPHALT SHINGLE</text>
  <text x="150" y="197" text-anchor="middle" fill="#9ca3af" font-family="Arial,Helvetica,sans-serif" font-size="8" letter-spacing="0.5">Traditional / Budget-friendly</text>
</svg>

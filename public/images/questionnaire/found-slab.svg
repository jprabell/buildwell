<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="200" height="150" fill="#f5f5f4"/>
  <!-- Soil -->
  <rect x="0" y="92" width="200" height="58" fill="#a07850"/>
  <!-- Gravel bed -->
  <rect x="18" y="92" width="164" height="10" fill="#c4b5a0"/>
  <circle cx="35" cy="97" r="2" fill="#8a7a6a"/>
  <circle cx="55" cy="96" r="2.5" fill="#7a6a5a"/>
  <circle cx="75" cy="97" r="2" fill="#8a7a6a"/>
  <circle cx="95" cy="96" r="2.5" fill="#7a6a5a"/>
  <circle cx="115" cy="97" r="2" fill="#8a7a6a"/>
  <circle cx="135" cy="96" r="2.5" fill="#7a6a5a"/>
  <circle cx="155" cy="97" r="2" fill="#8a7a6a"/>
  <circle cx="175" cy="96" r="2.5" fill="#7a6a5a"/>
  <!-- Concrete slab -->
  <rect x="18" y="73" width="164" height="20" fill="#d6d3d1" stroke="#78716c" stroke-width="2"/>
  <!-- Rebar cross-section dots -->
  <circle cx="55" cy="83" r="3" fill="#6b7280"/>
  <circle cx="100" cy="83" r="3" fill="#6b7280"/>
  <circle cx="145" cy="83" r="3" fill="#6b7280"/>
  <!-- Horizontal rebar line -->
  <line x1="18" y1="83" x2="182" y2="83" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,6"/>
  <!-- Grade line -->
  <line x1="0" y1="73" x2="200" y2="73" stroke="#d97706" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Left wall -->
  <rect x="18" y="22" width="20" height="51" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1.5"/>
  <!-- Right wall -->
  <rect x="162" y="22" width="20" height="51" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1.5"/>
</svg>

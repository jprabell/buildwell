<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#f1f5f9"/>
  <!-- Corrugated metal panel texture on a barn roof face -->
  <defs>
    <clipPath id="metalRoofClip">
      <polygon points="150,30 30,130 270,130"/>
    </clipPath>
  </defs>
  <!-- Base roof fill -->
  <polygon points="150,30 30,130 270,130" fill="#9ca3af"/>
  <!-- Corrugation lines clipped to roof triangle -->
  <g clip-path="url(#metalRoofClip)">
    <line x1="0" y1="55" x2="300" y2="55" stroke="#6b7280" stroke-width="3"/>
    <line x1="0" y1="62" x2="300" y2="62" stroke="#d1d5db" stroke-width="1"/>
    <line x1="0" y1="70" x2="300" y2="70" stroke="#6b7280" stroke-width="3"/>
    <line x1="0" y1="77" x2="300" y2="77" stroke="#d1d5db" stroke-width="1"/>
    <line x1="0" y1="85" x2="300" y2="85" stroke="#6b7280" stroke-width="3"/>
    <line x1="0" y1="92" x2="300" y2="92" stroke="#d1d5db" stroke-width="1"/>
    <line x1="0" y1="100" x2="300" y2="100" stroke="#6b7280" stroke-width="3"/>
    <line x1="0" y1="107" x2="300" y2="107" stroke="#d1d5db" stroke-width="1"/>
    <line x1="0" y1="115" x2="300" y2="115" stroke="#6b7280" stroke-width="3"/>
    <line x1="0" y1="122" x2="300" y2="122" stroke="#d1d5db" stroke-width="1"/>
  </g>
  <!-- Eave line -->
  <line x1="30" y1="130" x2="270" y2="130" stroke="#374151" stroke-width="2"/>
  <!-- Ridge line -->
  <line x1="130" y1="30" x2="170" y2="30" stroke="#374151" stroke-width="3"/>
  <!-- Barn body below -->
  <rect x="50" y="130" width="200" height="40" fill="#7c2d12"/>
  <!-- Door -->
  <rect x="126" y="138" width="48" height="32" fill="#431407"/>
  <line x1="150" y1="138" x2="150" y2="170" stroke="#7c2d12" stroke-width="1.5"/>
  <!-- Label -->
  <rect x="0" y="175" width="300" height="25" fill="#1c1917"/>
  <text x="150" y="188" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" letter-spacing="1">METAL PANEL</text>
  <text x="150" y="197" text-anchor="middle" fill="#9ca3af" font-family="Arial,Helvetica,sans-serif" font-size="8" letter-spacing="0.5">Corrugated Steel</text>
</svg>

<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="180" fill="#e0f2fe"/>
  <!-- Interior background (left) -->
  <rect x="0" y="0" width="148" height="155" fill="#eff6ff" opacity="0.6"/>
  <!-- Exterior background (right) -->
  <rect x="152" y="0" width="148" height="155" fill="#f0fdf4" opacity="0.4"/>
  <!-- Wall -->
  <rect x="143" y="0" width="14" height="155" fill="#d6d3d1" stroke="#a8a29e" stroke-width="1"/>
  <text x="150" y="165" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#a8a29e">WALL</text>
  <!-- Interior label -->
  <text x="68" y="20" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3b82f6">INTERIOR</text>
  <!-- Exterior label -->
  <text x="228" y="20" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#16a34a">EXTERIOR</text>
  <!-- Indoor wall unit (slim, mounted high) -->
  <rect x="28" y="48" width="90" height="22" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" rx="5"/>
  <!-- Louvre lines -->
  <line x1="38" y1="64" x2="58" y2="64" stroke="#94a3b8" stroke-width="1"/>
  <line x1="64" y1="64" x2="84" y2="64" stroke="#94a3b8" stroke-width="1"/>
  <line x1="90" y1="64" x2="110" y2="64" stroke="#94a3b8" stroke-width="1"/>
  <!-- Airflow from indoor unit -->
  <path d="M55,70 Q58,80 53,90" stroke="#93c5fd" stroke-width="1.5" fill="none"/>
  <path d="M73,70 Q76,83 71,96" stroke="#93c5fd" stroke-width="1.5" fill="none"/>
  <path d="M91,70 Q94,80 89,90" stroke="#93c5fd" stroke-width="1.5" fill="none"/>
  <polygon points="50,90 56,90 53,97" fill="#93c5fd"/>
  <polygon points="68,96 74,96 71,103" fill="#93c5fd"/>
  <polygon points="86,90 92,90 89,97" fill="#93c5fd"/>
  <text x="73" y="40" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#475569">INDOOR UNIT</text>
  <!-- Refrigerant line through wall -->
  <line x1="118" y1="56" x2="185" y2="80" stroke="#1e293b" stroke-width="2.5"/>
  <line x1="118" y1="62" x2="185" y2="86" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Outdoor compressor unit -->
  <rect x="185" y="70" width="75" height="65" fill="#6b7280" stroke="#374151" stroke-width="2" rx="3"/>
  <!-- Fan grille -->
  <circle cx="222" cy="102" r="22" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="222" cy="102" r="13" fill="none" stroke="#9ca3af" stroke-width="1"/>
  <line x1="222" y1="80" x2="222" y2="124" stroke="#9ca3af" stroke-width="1"/>
  <line x1="200" y1="102" x2="244" y2="102" stroke="#9ca3af" stroke-width="1"/>
  <line x1="206" y1="86" x2="238" y2="118" stroke="#9ca3af" stroke-width="0.8"/>
  <line x1="238" y1="86" x2="206" y2="118" stroke="#9ca3af" stroke-width="0.8"/>
  <!-- Ground below outdoor unit -->
  <rect x="175" y="135" width="95" height="5" fill="#d4c4a8"/>
  <rect x="175" y="137" width="95" height="4" fill="#86efac"/>
  <text x="222" y="83" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white">OUTDOOR UNIT</text>
  <text x="150" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#44403c">MINI-SPLIT SYSTEM</text>
</svg>

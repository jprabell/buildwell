<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#f1f5f9"/>
  <defs>
    <clipPath id="seamRoofClip">
      <polygon points="150,30 30,130 270,130"/>
    </clipPath>
  </defs>
  <!-- Base roof fill — dark charcoal, modern look -->
  <polygon points="150,30 30,130 270,130" fill="#374151"/>
  <!-- Standing seam vertical lines clipped to roof triangle -->
  <g clip-path="url(#seamRoofClip)">
    <!-- Seam lines running up the slope from eave to ridge -->
    <line x1="70" y1="30" x2="70" y2="130" stroke="#1f2937" stroke-width="3"/>
    <line x1="72" y1="30" x2="72" y2="130" stroke="#4b5563" stroke-width="1"/>
    <line x1="95" y1="30" x2="95" y2="130" stroke="#1f2937" stroke-width="3"/>
    <line x1="97" y1="30" x2="97" y2="130" stroke="#4b5563" stroke-width="1"/>
    <line x1="120" y1="30" x2="120" y2="130" stroke="#1f2937" stroke-width="3"/>
    <line x1="122" y1="30" x2="122" y2="130" stroke="#4b5563" stroke-width="1"/>
    <line x1="145" y1="30" x2="145" y2="130" stroke="#1f2937" stroke-width="3"/>
    <line x1="147" y1="30" x2="147" y2="130" stroke="#4b5563" stroke-width="1"/>
    <line x1="170" y1="30" x2="170" y2="130" stroke="#1f2937" stroke-width="3"/>
    <line x1="172" y1="30" x2="172" y2="130" stroke="#4b5563" stroke-width="1"/>
    <line x1="195" y1="30" x2="195" y2="130" stroke="#1f2937" stroke-width="3"/>
    <line x1="197" y1="30" x2="197" y2="130" stroke="#4b5563" stroke-width="1"/>
    <line x1="220" y1="30" x2="220" y2="130" stroke="#1f2937" stroke-width="3"/>
    <line x1="222" y1="30" x2="222" y2="130" stroke="#4b5563" stroke-width="1"/>
  </g>
  <line x1="30" y1="130" x2="270" y2="130" stroke="#111827" stroke-width="2"/>
  <!-- Barn body -->
  <rect x="50" y="130" width="200" height="40" fill="#7c2d12"/>
  <rect x="126" y="138" width="48" height="32" fill="#431407"/>
  <line x1="150" y1="138" x2="150" y2="170" stroke="#7c2d12" stroke-width="1.5"/>
  <!-- Label -->
  <rect x="0" y="175" width="300" height="25" fill="#1c1917"/>
  <text x="150" y="188" text-anchor="middle" fill="white" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="700" letter-spacing="1">STANDING SEAM METAL</text>
  <text x="150" y="197" text-anchor="middle" fill="#9ca3af" font-family="Arial,Helvetica,sans-serif" font-size="8" letter-spacing="0.5">Premium / Long-lasting</text>
</svg>

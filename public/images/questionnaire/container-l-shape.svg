  <rect x="58" y="75" width="30" height="82" fill="#475569" stroke="#1e293b" stroke-width="2" rx="1"/>
  <line x1="58" y1="95" x2="88" y2="95" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="58" y1="115" x2="88" y2="115" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="58" y1="135" x2="88" y2="135" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <rect x="58" y="145" width="30" height="12" fill="#334155" stroke="#1e293b" stroke-width="1"/>
  <text x="73" y="115" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#e2e8f0" font-weight="bold" transform="rotate(-90,73,115)">CONTAINER 2</text>
  <text x="150" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#44403c">L-SHAPE</text>

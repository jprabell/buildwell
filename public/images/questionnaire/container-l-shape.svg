<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="180" fill="#f1f5f9"/>
  <text x="150" y="22" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">PLAN VIEW (TOP-DOWN)</text>
  <!-- Container 1 (horizontal, top) -->
  <rect x="58" y="45" width="170" height="30" fill="#64748b" stroke="#1e293b" stroke-width="2" rx="1"/>
  <line x1="80" y1="45" x2="80" y2="75" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="105" y1="45" x2="105" y2="75" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="130" y1="45" x2="130" y2="75" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="155" y1="45" x2="155" y2="75" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="180" y1="45" x2="180" y2="75" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="205" y1="45" x2="205" y2="75" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <rect x="216" y="45" width="12" height="30" fill="#334155" stroke="#1e293b" stroke-width="1"/>
  <text x="143" y="65" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e2e8f0" font-weight="bold">CONTAINER 1</text>
  <!-- Corner highlight -->
  <rect x="58" y="45" width="30" height="30" fill="#d97706" opacity="0.3"/>

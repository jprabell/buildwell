<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="200" height="150" fill="#f5f5f4"/>
  <!-- Soil sides (buried) -->
  <rect x="0" y="52" width="30" height="98" fill="#a07850"/>
  <rect x="170" y="52" width="30" height="98" fill="#a07850"/>
  <!-- Basement interior -->
  <rect x="30" y="52" width="140" height="82" fill="#e8ecf0"/>
  <!-- Basement floor slab -->
  <rect x="30" y="128" width="140" height="8" fill="#d6d3d1" stroke="#78716c" stroke-width="1"/>
  <!-- Left concrete wall -->
  <rect x="20" y="52" width="18" height="82" fill="#d6d3d1" stroke="#78716c" stroke-width="2"/>
  <!-- Right concrete wall -->
  <rect x="162" y="52" width="18" height="82" fill="#d6d3d1" stroke="#78716c" stroke-width="2"/>
  <!-- Grade / first floor slab -->
  <rect x="18" y="42" width="164" height="12" fill="#c4b5a0" stroke="#78716c" stroke-width="1"/>
  <!-- Grade line -->
  <line x1="0" y1="52" x2="200" y2="52" stroke="#d97706" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Basement windows -->
  <rect x="20" y="90" width="18" height="10" fill="#bfdbfe" stroke="#6b7280" stroke-width="1"/>
  <rect x="162" y="90" width="18" height="10" fill="#bfdbfe" stroke="#6b7280" stroke-width="1"/>
  <!-- Wall stubs above grade -->
  <rect x="18" y="8" width="18" height="34" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1.5"/>
  <rect x="164" y="8" width="18" height="34" fill="#e7e5e4" stroke="#a8a29e" stroke-width="1.5"/>
</svg>

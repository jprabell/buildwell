<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="180" fill="#e0f2fe"/>
  <rect y="140" width="300" height="40" fill="#d4c4a8"/>
  <rect y="137" width="300" height="6" fill="#86efac"/>
  <!-- Stovepipe going up through ceiling -->
  <rect x="137" y="20" width="22" height="78" fill="#374151" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Smoke from chimney -->
  <path d="M140,20 Q132,12 138,5" stroke="#9ca3af" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M148,18 Q148,10 155,5" stroke="#9ca3af" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M158,20 Q165,12 162,4" stroke="#9ca3af" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Stove body -->
  <rect x="95" y="95" width="105" height="48" fill="#292524" stroke="#1c1917" stroke-width="2" rx="4"/>
  <!-- Glass viewing window with flames -->
  <rect x="110" y="103" width="75" height="34" fill="#1c1917" stroke="#374151" stroke-width="1" rx="3"/>
  <!-- Flames -->
  <path d="M118,134 Q121,120 126,125 Q129,114 135,120 Q138,110 144,116 Q147,108 153,112 Q156,120 162,116 Q165,124 168,130 Q165,134 155,134 Z" fill="#f97316" opacity="0.95"/>
  <path d="M122,134 Q125,124 130,128 Q133,118 139,122 Q142,116 148,120 Q150,128 155,122 Q158,128 160,134 Z" fill="#fbbf24" opacity="0.9"/>
  <path d="M128,134 Q131,128 135,130 Q138,124 143,127 Q145,132 148,129 Q150,134 128,134 Z" fill="#fde68a" opacity="0.8"/>
  <!-- Door handle -->
  <circle cx="147" cy="121" r="4" fill="#6b7280" stroke="#374151" stroke-width="1"/>
  <!-- Legs -->
  <rect x="105" y="143" width="10" height="14" fill="#1c1917" rx="1"/>
  <rect x="180" y="143" width="10" height="14" fill="#1c1917" rx="1"/>
  <!-- Pipe connection from stove top to stovepipe -->
  <rect x="137" y="88" width="22" height="10" fill="#4b5563" stroke="#374151" stroke-width="1"/>
  <!-- Firewood stack to the side -->
  <rect x="218" y="122" width="45" height="9" fill="#92400e" rx="4"/>
  <rect x="214" y="113" width="42" height="9" fill="#a16207" rx="4"/>
  <rect x="220" y="104" width="38" height="9" fill="#92400e" rx="4"/>
  <!-- Heat waves from stove -->
  <path d="M100,90 Q96,82 100,74" stroke="#f97316" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M200,90 Q204,82 200,74" stroke="#f97316" stroke-width="1.5" fill="none" opacity="0.5"/>
  <text x="150" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#44403c">WOOD STOVE / PELLET STOVE</text>
</svg>

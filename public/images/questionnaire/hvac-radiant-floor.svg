<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="180" fill="#e0f2fe"/>
  <!-- Room space above floor -->
  <rect x="18" y="20" width="264" height="55" fill="#f0f9ff" opacity="0.6"/>
  <!-- Heat rising arrows in room -->
  <text x="60" y="58" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#f97316" opacity="0.8">↑</text>
  <text x="110" y="48" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#f97316" opacity="0.8">↑</text>
  <text x="160" y="52" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#f97316" opacity="0.8">↑</text>
  <text x="210" y="46" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#f97316" opacity="0.8">↑</text>
  <text x="255" y="58" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#f97316" opacity="0.8">↑</text>
  <!-- Floor label -->
  <text x="150" y="34" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#64748b">warm radiant heat rises evenly</text>
  <!-- Flooring top layer (wood) -->
  <rect x="18" y="75" width="264" height="14" fill="#c4861a" stroke="#92400e" stroke-width="1"/>
  <line x1="68" y1="75" x2="68" y2="89" stroke="#92400e" stroke-width="0.7" opacity="0.6"/>
  <line x1="120" y1="75" x2="120" y2="89" stroke="#92400e" stroke-width="0.7" opacity="0.6"/>
  <line x1="178" y1="75" x2="178" y2="89" stroke="#92400e" stroke-width="0.7" opacity="0.6"/>
  <line x1="234" y1="75" x2="234" y2="89" stroke="#92400e" stroke-width="0.7" opacity="0.6"/>
  <text x="150" y="85" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white">HARDWOOD / TILE FLOORING</text>
  <!-- PEX tubing layer -->
  <rect x="18" y="89" width="264" height="24" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="24" y="97" text-anchor="start" font-family="sans-serif" font-size="7" fill="#d97706">PEX TUBING</text>
  <!-- Wavy PEX pipes -->
  <path d="M22,105 Q36,98 50,105 Q64,112 78,105 Q92,98 106,105 Q120,112 134,105 Q148,98 162,105 Q176,112 190,105 Q204,98 218,105 Q232,112 246,105 Q260,98 276,105" stroke="#d97706" stroke-width="2.5" fill="none"/>
  <!-- Concrete slab layer -->
  <rect x="18" y="113" width="264" height="18" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="150" y="125" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#6b7280">CONCRETE SLAB</text>
  <!-- Insulation layer -->
  <rect x="18" y="131" width="264" height="10" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
  <text x="150" y="139" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#78716c">INSULATION</text>
  <!-- Ground/earth -->
  <rect x="18" y="141" width="264" height="28" fill="#d4c4a8"/>
  <!-- Boiler/heat source on left -->
  <rect x="0" y="89" width="20" height="44" fill="#4b5563" stroke="#374151" stroke-width="1.5" rx="2"/>
  <text x="10" y="106" text-anchor="middle" font-family="sans-serif" font-size="5" fill="white">BOIL</text>
  <text x="10" y="114" text-anchor="middle" font-family="sans-serif" font-size="5" fill="white">ER</text>
  <text x="10" y="122" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#fbbf24">🔥</text>
  <text x="150" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#44403c">RADIANT FLOOR HEAT</text>
</svg>

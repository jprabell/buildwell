<svg viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="180" fill="#f1f5f9"/>
  <text x="150" y="20" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#94a3b8">PLAN VIEW (TOP-DOWN)</text>
  <!-- Top container (horizontal) -->
  <rect x="42" y="35" width="216" height="28" fill="#64748b" stroke="#1e293b" stroke-width="2" rx="1"/>
  <line x1="66" y1="35" x2="66" y2="63" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="92" y1="35" x2="92" y2="63" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="118" y1="35" x2="118" y2="63" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="144" y1="35" x2="144" y2="63" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="170" y1="35" x2="170" y2="63" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="196" y1="35" x2="196" y2="63" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="222" y1="35" x2="222" y2="63" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <text x="150" y="54" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#e2e8f0" font-weight="bold">CONTAINER 1 (TOP)</text>
  <!-- Left container (vertical) -->
  <rect x="42" y="63" width="28" height="75" fill="#64748b" stroke="#1e293b" stroke-width="2" rx="1"/>
  <line x1="42" y1="83" x2="70" y2="83" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="42" y1="103" x2="70" y2="103" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="42" y1="123" x2="70" y2="123" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <!-- Right container (vertical) -->
  <rect x="230" y="63" width="28" height="75" fill="#64748b" stroke="#1e293b" stroke-width="2" rx="1"/>
  <line x1="230" y1="83" x2="258" y2="83" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="230" y1="103" x2="258" y2="103" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="230" y1="123" x2="258" y2="123" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <!-- Open courtyard center -->
  <rect x="70" y="63" width="160" height="75" fill="#dbeafe" opacity="0.4"/>
  <text x="150" y="103" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3b82f6">open</text>
  <text x="150" y="116" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3b82f6">courtyard</text>
  <!-- Corner highlights -->
  <rect x="42" y="35" width="28" height="28" fill="#d97706" opacity="0.25"/>
  <rect x="230" y="35" width="28" height="28" fill="#d97706" opacity="0.25"/>
  <text x="150" y="170" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#44403c">U-SHAPE</text>
</svg>
